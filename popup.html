<!DOCTYPE html>
<html>
<head>
  <title>AI Debugger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h3>Console Errors</h3>
  <select id="errorSelect" style="width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #cbd5e0; border-radius: 4px; outline: none; background: white; font-size: 12px;"></select>
  <div id="errorDetail">Belum ada error.</div>

  <textarea id="codeSnippet" placeholder="[Opsional] Paste blok kode Anda di sini agar solusi AI lebih sangat akurat..." style="width: 100%; height: 80px; margin-top: 5px; border: 1px solid #cbd5e0; border-radius: 4px; padding: 8px; font-family: monospace; font-size: 11px; resize: vertical; box-sizing: border-box;"></textarea>

  <input type="text" id="apiKey" placeholder="Masukkan OpenRouter API Key" style="margin-top: 5px; display: block; width: 100%;">
  <button id="saveKey" style="margin-top: 10px; width: 100%;">Simpan API Key</button>
  <button id="explain" style="margin-top: 5px; width: 100%;">Explain with AI</button>
  <div id="result" class="result-box">Belum ada penjelasan.</div>

  <script src="popup.js"></script>
</body>
</html>
